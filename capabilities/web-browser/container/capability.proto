syntax = "proto3";

package selu.capability.v1;

// Unified interface implemented by every capability container,
// regardless of whether it is a Tool or Environment class.
service Capability {
  // Synchronous tool invocation
  rpc Invoke(InvokeRequest) returns (InvokeResponse);

  // Streaming invocation — for long-running operations (env capabilities)
  rpc StreamInvoke(InvokeRequest) returns (stream InvokeChunk);

  // Liveness check — orchestrator polls until ready before first Invoke
  rpc Healthcheck(HealthRequest) returns (HealthResponse);
}

message InvokeRequest {
  // Tool name as declared in capability manifest
  string tool_name = 1;

  // JSON-encoded tool arguments (matches tool's input_schema)
  bytes args_json = 2;

  // JSON-encoded credentials/config injected by the orchestrator.
  // Only fields declared in the manifest's credentials[] are included.
  bytes config_json = 3;

  // Session ID — used by Environment capabilities to locate their workspace
  string session_id = 4;

  // Capability ID — for logging / telemetry inside the container
  string capability_id = 5;

  // Thread ID — identifies the conversation thread within a session.
  // Capabilities that manage stateful resources (e.g. browser tabs) use this
  // to isolate state per thread, so multiple threads sharing one container
  // don't interfere with each other.
  string thread_id = 6;
}

message InvokeResponse {
  // JSON-encoded result to be returned to the LLM as tool result
  bytes result_json = 1;

  // Non-empty if the invocation failed
  string error = 2;
}

message InvokeChunk {
  // Partial data (for streaming environment capabilities)
  bytes data = 1;

  // True when the stream is complete
  bool done = 2;

  // Non-empty if an error occurred
  string error = 3;
}

message HealthRequest {}

message HealthResponse {
  bool ready = 1;
  string message = 2;
}
