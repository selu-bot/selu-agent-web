id: web-browser
class: tool
image: selu-cap-web-browser:latest

tools:
  - name: navigate
    description: >
      Navigate the browser to a URL. Returns a snapshot of the loaded page
      including the title, URL, interactive elements, and visible text.
    input_schema:
      type: object
      properties:
        url:
          type: string
          description: "The URL to navigate to (e.g. 'https://www.example.com')."
      required:
        - url
    recommended_policy: allow

  - name: get_page_snapshot
    description: >
      Get a structured snapshot of the current page: URL, title, a numbered
      list of all interactive elements (links, buttons, inputs, selects), and
      the visible text content. This is your primary way of seeing what is on
      the page.
    input_schema:
      type: object
      properties:
        max_text_length:
          type: integer
          description: "Maximum number of characters of page text to include. Default 5000."
      required: []
    recommended_policy: allow

  - name: click
    description: >
      Click an interactive element on the page. Identify the element by its
      index number from the most recent page snapshot, a CSS selector, or
      visible text content. After clicking, returns an updated page snapshot.
    input_schema:
      type: object
      properties:
        element_index:
          type: integer
          description: "Index number of the element from the page snapshot (e.g. 3)."
        selector:
          type: string
          description: "CSS selector to identify the element (e.g. 'button.submit')."
        text:
          type: string
          description: "Visible text content of the element to click (e.g. 'Sign In')."
      required: []
    recommended_policy: allow

  - name: fill
    description: >
      Type text into an input field or textarea. Identify the field by its
      index number from the page snapshot or a CSS selector. Clears the field
      first by default.
    input_schema:
      type: object
      properties:
        element_index:
          type: integer
          description: "Index number of the input from the page snapshot."
        selector:
          type: string
          description: "CSS selector for the input field."
        value:
          type: string
          description: "The text to type into the field."
        clear_first:
          type: boolean
          description: "Whether to clear existing text before typing. Default true."
      required:
        - value
    recommended_policy: allow

  - name: select_option
    description: >
      Select an option from a dropdown (select element). Identify the dropdown
      by its index number or CSS selector, and the option by its value or
      visible label text.
    input_schema:
      type: object
      properties:
        element_index:
          type: integer
          description: "Index number of the select element from the page snapshot."
        selector:
          type: string
          description: "CSS selector for the select element."
        value:
          type: string
          description: "The option value attribute to select."
        label:
          type: string
          description: "The visible text of the option to select."
      required: []
    recommended_policy: allow

  - name: press_key
    description: >
      Press a keyboard key, optionally targeting a specific element first.
      Common keys: Enter, Tab, Escape, Backspace, ArrowDown, ArrowUp, Space.
    input_schema:
      type: object
      properties:
        key:
          type: string
          description: "The key to press (e.g. 'Enter', 'Tab', 'Escape', 'ArrowDown')."
        element_index:
          type: integer
          description: "Index of the element to focus before pressing the key."
        selector:
          type: string
          description: "CSS selector of the element to focus before pressing the key."
      required:
        - key
    recommended_policy: allow

  - name: scroll
    description: >
      Scroll the page up or down to reveal more content. Returns an updated
      page snapshot after scrolling.
    input_schema:
      type: object
      properties:
        direction:
          type: string
          description: "Scroll direction: 'up' or 'down'."
          enum:
            - up
            - down
        amount:
          type: string
          description: "How far to scroll: 'page' for one viewport height, or a number of pixels (e.g. '500'). Default 'page'."
      required:
        - direction
    recommended_policy: allow

  - name: go_back
    description: >
      Navigate back to the previous page in browser history. Returns a
      snapshot of the page after going back.
    input_schema:
      type: object
      properties: {}
      required: []
    recommended_policy: allow

  - name: wait
    description: >
      Wait for an element matching a CSS selector to appear on the page. Useful
      when a page is loading content dynamically. Returns whether the element
      was found within the timeout.
    input_schema:
      type: object
      properties:
        selector:
          type: string
          description: "CSS selector to wait for."
        timeout_seconds:
          type: integer
          description: "Maximum time to wait in seconds. Default 10."
      required:
        - selector
    recommended_policy: allow

  - name: execute_javascript
    description: >
      Execute arbitrary JavaScript code on the current page and return the
      result. Use this as a last resort when other tools cannot accomplish
      what you need. The script runs in the browser context and has access
      to the DOM.
    input_schema:
      type: object
      properties:
        script:
          type: string
          description: "JavaScript code to execute. Use 'return' to produce a result."
      required:
        - script
    recommended_policy: ask

  - name: search
    description: >
      Search the web for a query and return structured results. Uses the
      SerpAPI or Brave Search API when a corresponding API key credential is
      configured, which provides reliable results without bot-detection issues.
      If both keys are configured, one provider is chosen at random per
      request to distribute load across free-tier limits. Falls back to
      performing the search directly in the browser when no API key is
      available (may trigger CAPTCHAs on some search engines).
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: "The search query (e.g. 'best hotels in Paris')."
        num_results:
          type: integer
          description: "Maximum number of results to return. Default 10."
        search_engine:
          type: string
          description: "Search engine to use: 'google' (default) or 'duckduckgo'. Only affects SerpAPI mode; Brave Search always uses its own index."
          enum:
            - google
            - duckduckgo
      required:
        - query
    recommended_policy: allow

  - name: save_state
    description: >
      Save a key-value pair to session memory. Use this to remember your
      progress, plans, and collected information across messages. Values
      can be any JSON type (string, number, object, array, boolean).
    input_schema:
      type: object
      properties:
        key:
          type: string
          description: "The key to store the value under (e.g. 'step', 'booking', 'completed_steps')."
        value:
          description: "The value to store. Can be any JSON-serializable type."
      required:
        - key
        - value
    recommended_policy: allow

  - name: load_state
    description: >
      Load all saved session state. Returns a JSON object with all key-value
      pairs previously saved with save_state. Returns an empty object if
      nothing has been saved yet.
    input_schema:
      type: object
      properties: {}
      required: []
    recommended_policy: allow

network:
  mode: any

filesystem: temp

credentials:
  - name: SERPAPI_API_KEY
    scope: system
    description: >
      API key for SerpAPI (https://serpapi.com). Enables reliable web search
      without bot-detection issues. Optional — if not provided and no
      BRAVE_SEARCH_API_KEY is set either, the search tool falls back to
      performing searches directly in the browser.
    required: false

  - name: BRAVE_SEARCH_API_KEY
    scope: system
    description: >
      API key for Brave Search API (https://brave.com/search/api/). Enables
      reliable web search without bot-detection issues. Optional — if not
      provided and no SERPAPI_API_KEY is set either, the search tool falls
      back to performing searches directly in the browser. When both keys
      are configured, one provider is chosen at random per request to
      distribute load across free-tier limits.
    required: false

resources:
  max_memory_mb: 2048
  max_cpu_fraction: 2.0
  max_cpu_seconds: 300
  pids_limit: 256
