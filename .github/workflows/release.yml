name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -- Prepare metadata --

      - name: Lowercase image name
        id: meta
        run: |
          owner="${{ github.repository_owner }}"
          echo "cap_image=${owner,,}/selu-cap-web-browser" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # -- Build & push capability Docker image --

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push capability image
        uses: docker/build-push-action@v6
        with:
          context: capabilities/web-browser/container
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.cap_image }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.cap_image }}:latest

      # -- Create agent archive --

      - name: Update manifest with GHCR image reference
        run: |
          sed -i "s|image: selu-cap-web-browser:latest|image: ${{ env.REGISTRY }}/${{ steps.meta.outputs.cap_image }}:${{ steps.version.outputs.version }}|" \
            capabilities/web-browser/manifest.yaml

      - name: Create agent archive
        run: |
          tar czf agent.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='capabilities/*/container' \
            --exclude='README.md' \
            agent.yaml \
            agent.md \
            capabilities/

      - name: Compute SHA-256
        id: sha
        run: |
          sha=$(sha256sum agent.tar.gz | awk '{print $1}')
          echo "sha256=${sha}" >> "$GITHUB_OUTPUT"
          echo "### Archive SHA-256" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${sha}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # -- Create GitHub release --

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: agent.tar.gz
          generate_release_notes: true
          body: |
            ## Installation

            Install from the Selu marketplace UI, or use these details for manual configuration:

            **Archive URL:**
            ```
            https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/agent.tar.gz
            ```

            **Archive SHA-256:**
            ```
            ${{ steps.sha.outputs.sha256 }}
            ```

            **Capability image:**
            ```
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.cap_image }}:${{ steps.version.outputs.version }}
            ```

            ### Marketplace JSON entry

            ```json
            {
              "id": "web",
              "name": "Web Assistant",
              "description": "Browse and automate websites — research, book, fill forms.",
              "version": "${{ steps.version.outputs.version }}",
              "author": "Selu Team",
              "archive_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/agent.tar.gz",
              "archive_sha256": "${{ steps.sha.outputs.sha256 }}",
              "capability_images": ["${{ env.REGISTRY }}/${{ steps.meta.outputs.cap_image }}:${{ steps.version.outputs.version }}"]
            }
            ```

      # -- Notify Selu marketplace --

      - name: Notify Selu marketplace
        if: secrets.SELU_WEBHOOK_URL != '' && secrets.SELU_WEBHOOK_TOKEN != ''
        continue-on-error: true
        run: |
          curl -sf -X POST \
            "${{ secrets.SELU_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.SELU_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "version": "${{ steps.version.outputs.version }}",
              "archive_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/agent.tar.gz",
              "archive_sha256": "${{ steps.sha.outputs.sha256 }}",
              "capability_images": ["${{ env.REGISTRY }}/${{ steps.meta.outputs.cap_image }}:${{ steps.version.outputs.version }}"]
            }'
